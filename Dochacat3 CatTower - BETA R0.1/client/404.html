    <style>
        :root {
            --bg-base: #050505;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-border: #30363d;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-gray: #c9d1d9;
            --accent: #ffb7c5; 
            --cardinal: #ff4757; 
            --success: #2ea043;
            --brand-purple: #a855f7;
            --glitch-cyan: #0ff;
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif;
            background-color: var(--bg-base); color: var(--text-main);
            height: 100vh; overflow: hidden; display: flex;
            align-items: center; justify-content: center; position: relative;
        }

        .ambient-orb {
            position: absolute; border-radius: 50%; filter: blur(90px); z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(168, 85, 247, 0.15); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(255, 183, 197, 0.1); bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; z-index: 1; pointer-events: none;
        }

        .auth-card { 
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px var(--glass-border); 
            width: 100%; max-width: 450px; overflow: hidden; position: relative; z-index: 10;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .auth-card::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 20; background-size: 100% 2px, 3px 100%; pointer-events: none; opacity: 0.3;
        }

        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

        .status-bar {
            width: 100%; height: 30px; background: rgba(0, 0, 0, 0.2); border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; padding: 0 15px; gap: 8px; box-sizing: border-box;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-red { background: #ff5f56; opacity: 0.3;}
        .dot-yel { background: #ffbd2e; box-shadow: 0 0 10px #ffbd2e; }
        .dot-grn { background: #27c93f; opacity: 0.3;}

        .brand-container { padding: 30px 0 10px 0; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .engine-overline { 
            font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 700; 
            letter-spacing: 10px; color: var(--text-muted); opacity: 0.5; text-transform: uppercase; 
            margin-bottom: -5px; padding-left: 5px;
        }
        
        .brand-row { display: flex; align-items: center; justify-content: center; gap: 20px; }
        
        .server-tower-logo { width: 65px; height: 80px; position: relative; z-index: 25; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        
        .cattower-logo { font-family: 'Montserrat', sans-serif; font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; text-transform: uppercase; color: white; z-index: 25;}
        .cattower-logo .alt-color { color: var(--accent); text-shadow: 0 0 20px rgba(255, 183, 197, 0.4); }

        .led-blink-fast { animation: ledBlink 0.6s infinite alternate; }
        .led-blink-slow { animation: ledBlink 2s infinite alternate; }
        .led-blink-alt { animation: ledBlink 1.2s infinite alternate-reverse; }
        .data-pulse { animation: dataStream 2s infinite; }
        
        @keyframes ledBlink {
            0%, 40% { opacity: 1; filter: drop-shadow(0 0 5px currentColor); }
            60%, 100% { opacity: 0.2; filter: none; }
        }
        @keyframes dataStream {
            0%, 100% { opacity: 0.4; filter: drop-shadow(0 0 2px var(--accent)); stroke-width: 2; }
            50% { opacity: 1; filter: drop-shadow(0 0 10px var(--accent)); stroke-width: 3.5; }
        }

        .content { padding: 15px 30px 40px 30px; text-align: center; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 25;}

        .holo-404 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-size: 5rem; line-height: 1; margin: 0 0 10px 0;
            color: transparent; -webkit-text-stroke: 2px var(--brand-purple);
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
            position: relative; display: inline-block;
            animation: holoFloat 4s ease-in-out infinite alternate, mainGlitch 3s infinite;
        }

        .holo-404::before, .holo-404::after {
            content: '404'; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; color: transparent;
        }
        .holo-404::before {
            left: 3px; text-shadow: -2px 0 var(--accent);
            animation: sliceGlitch 2s infinite linear alternate-reverse;
            z-index: -1; -webkit-text-stroke: 2px transparent; 
        }
        .holo-404::after {
            left: -3px; text-shadow: 2px 0 var(--glitch-cyan);
            animation: sliceGlitch2 3s infinite linear alternate;
            z-index: -2; -webkit-text-stroke: 2px transparent; 
        }

        @keyframes holoFloat {
            0% { transform: translateY(0px) skewX(0deg); filter: drop-shadow(0 5px 10px rgba(168, 85, 247, 0.3)); }
            100% { transform: translateY(-10px) skewX(-2deg); filter: drop-shadow(0 15px 25px rgba(168, 85, 247, 0.6)); }
        }
        @keyframes mainGlitch {
            0%, 95%, 100% { transform: skewX(0deg); }
            96% { transform: skewX(15deg); }
            97% { transform: skewX(-15deg); }
        }
                

        h1 { font-size: 1.5rem; margin: 0 0 5px 0; color: var(--text-main); font-weight: 800; letter-spacing: 1px; }
        
        .terminal-text { 
            font-family: 'Roboto Mono', monospace; color: var(--text-muted); font-size: 0.85rem; 
            margin-bottom: 30px; line-height: 1.5; position: relative;
        }
        .terminal-text::after {
            content: '_';
            color: var(--accent);
            animation: cursorBlink 1s step-start infinite;
        }
        @keyframes cursorBlink { 50% { opacity: 0; } }
        
        .btn {
            padding: 12px 30px; background: linear-gradient(135deg, var(--brand-purple), #c084fc); color: white;
            text-decoration: none; border-radius: 8px; font-weight: 700; font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); border: none;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5); }
    </style>
