        .modal-content h3 { margin-top: 0; color: var(--accent); margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;}

<script>  
    const socket = io();  
    const userGrid = document.getElementById('user-grid');  
    
    const pathParts = window.location.pathname.split('/');  
    const roomId = pathParts[pathParts.length - 1] || 'general';  
    document.getElementById('room-id-display').innerText = roomId.toUpperCase();  

    let localStream;  
    let isLocalMuted = false;  
    let peers = {};  
    let audioContext;  
    
    let userName = "Agent";  
    let userPfp = "";  

    const API_ENDPOINT = '/api/session';  

    async function fetchUserProfile() {  
        try {  
            const res = await fetch(API_ENDPOINT);  
            if (res.ok) {  
                const data = await res.json();  
                userName = data.username || data.name || "Agent";  

                userPfp = data.pfp || data.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(userName)}&background=a855f7&color=fff`; 
                return;  
            }  
        } catch (err) {  
            console.log("Could not fetch from API, using fallback.");  
        }  
        
        userName = "Agent " + Math.floor(Math.random() * 1000);  
        userPfp = `https://ui-avatars.com/api/?name=${encodeURIComponent(userName)}&background=a855f7&color=fff`;  
    }  

    function attachVolumeMeter(stream, wrapperId) {  
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();  
        
        if (audioContext.state === 'suspended') {  
            return;  
        }  
        
        try {  
            const audioTracks = stream.getAudioTracks();  
            if(audioTracks.length === 0) return;  

            const analyser = audioContext.createAnalyser();  
            const microphone = audioContext.createMediaStreamSource(new MediaStream([audioTracks[0]]));  
            microphone.connect(analyser);  
            analyser.fftSize = 256;  
            const bufferLength = analyser.frequencyBinCount;  
            const dataArray = new Uint8Array(bufferLength);  

            function checkVolume() {  
                analyser.getByteFrequencyData(dataArray);  
                let sum = 0;  
                for (let i = 0; i < bufferLength; i++) sum += dataArray[i];  
                let average = sum / bufferLength;  
                
                const wrapper = document.getElementById(wrapperId);  
                if (wrapper) {  
                    if (average > 15 && !wrapper.classList.contains('is-muted')) {  
                        wrapper.classList.add('is-speaking');  
                    } else {  
                        wrapper.classList.remove('is-speaking');  
                    }  
                }  
                requestAnimationFrame(checkVolume);  
            }  
            checkVolume();  
        } catch(e) {  
            console.log("Audio analyzer init failed", e);  
        }  
    }  

    async function init() {
        await fetchUserProfile();
        
        document.getElementById('local-name-label').innerText = userName + " (You)";
        document.getElementById('local-avatar-img').src = userPfp;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({  
                video: false,  
                audio: { 
                    sampleRate: 192000, 
                    sampleSize: 24, 
                    channelCount: 2,
                    echoCancellation: false, 
                    noiseSuppression: false, 
                    autoGainControl: false 
                }  
            });
            
            document.getElementById('local-audio').srcObject = localStream;
            attachVolumeMeter(localStream, 'local-user-wrapper');
            
            socket.emit('join-call', roomId);
        } catch (e) {
            console.error("Access denied", e);
            alert("Mic access required for calls.");
        }
    }

    socket.on('user-connected', (data) => {  
        const remoteSocketId = data.socketId;  
        const realUsername = data.username;  
        createPeerConnection(remoteSocketId, true, realUsername);  
    });  

    function createPeerConnection(userId, isOffer, remoteUserName = "Unknown") {  
        const pc = new RTCPeerConnection({  
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]  
        });  

        peers[userId] = pc;  

        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));  

        pc.ontrack = event => {  
            const stream = event.streams[0];  
            const wrapperId = `wrapper-${userId}-${stream.id}`;  

            if (document.getElementById(wrapperId)) return;  
            
            const wrapper = document.createElement('div');  
            wrapper.className = 'user-wrapper';  
            wrapper.id = wrapperId;  
            
            const muteIndicator = document.createElement('div');  
            muteIndicator.className = 'mute-indicator';  
            muteIndicator.innerHTML = `  

                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">  
                    <line x1="1" y1="1" x2="23" y2="23"></line>  
                    <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path>  
                    <path d="M17 16.95A7 7 0 0 1 5 12H3a9 9 0 0 0 11.5 8.8l-1.5-1.85z"></path>  
                    <path d="M21 12c0 1.5-.4 2.9-1.06 4.1l-1.65-1.65A4.98 4.98 0 0 0 19 12h2z"></path>  
                </svg>  
            `;  

            const audio = document.createElement('audio');  
            audio.autoplay = true;  
            audio.playsInline = true;  
            audio.srcObject = stream;  
            
            const safePfp = `https://ui-avatars.com/api/?name=${encodeURIComponent(remoteUserName)}&background=random&color=fff`; 
            
            const avatarImg = document.createElement('img');  
            avatarImg.src = safePfp;  
            avatarImg.className = 'avatar-img';  

            const label = document.createElement('div');  
            label.className = 'user-label';  
            label.innerText = remoteUserName;  
            
            wrapper.append(muteIndicator, audio, avatarImg, label);  
            userGrid.append(wrapper);  

            setTimeout(() => attachVolumeMeter(stream, wrapper.id), 1000);  
        };  

        pc.onicecandidate = event => {  
            if (event.candidate) {  
                socket.emit('ice-candidate', { candidate: event.candidate, to: userId });  
            }  
        };  
        
        pc.onnegotiationneeded = async () => {  
            try {  
                const offer = await pc.createOffer();  
                await pc.setLocalDescription(offer);  
                socket.emit('offer', { offer, to: userId });  
            } catch (err) {  
                console.error("Negotiation error:", err);  
            }  
        };  

        return pc;  
    }  

    socket.on('offer', async (data) => {  
        const { offer, from, username: remoteName } = data;  
        const pc = peers[from] || createPeerConnection(from, false, remoteName);  
        
        try {  
            await pc.setRemoteDescription(new RTCSessionDescription(offer));  
            const answer = await pc.createAnswer();  
            await pc.setLocalDescription(answer);  
            socket.emit('answer', { answer, to: from });  
        } catch (err) {  
            console.error("Error handling offer:", err);  
        }  
    });  

    socket.on('answer', ({ answer, from }) => {  
        if(peers[from]) peers[from].setRemoteDescription(new RTCSessionDescription(answer));  
    });  

    socket.on('ice-candidate', ({ candidate, from }) => {  
        if(peers[from]) peers[from].addIceCandidate(new RTCIceCandidate(candidate));  
    });  

    socket.on('user-disconnected', userId => {  
        if (peers[userId]) {  
            peers[userId].close();  
            delete peers[userId];  
        }  
        document.querySelectorAll(`[id^="wrapper-${userId}"]`).forEach(el => el.remove());  
    });  

    socket.on('mic-toggled', ({ userId, isMuted }) => {  
        const userWrappers = document.querySelectorAll(`[id^="wrapper-${userId}"]`);  
        userWrappers.forEach(wrapper => {  
            if (isMuted) {  
                wrapper.classList.add('is-muted');  
            } else {  
                wrapper.classList.remove('is-muted');  
            }  
        });  
    });  

    function toggleMic() {  
        if(audioContext && audioContext.state === 'suspended') audioContext.resume();  
        const audioTrack = localStream.getAudioTracks()[0];  
        if(!audioTrack) return;  
        
        isLocalMuted = !isLocalMuted;  
        audioTrack.enabled = !isLocalMuted;  
        
        document.getElementById('btn-mic').classList.toggle('off', isLocalMuted);  
        const localWrapper = document.getElementById('local-user-wrapper');  
        
        if (isLocalMuted) {  
            localWrapper.classList.add('is-muted');  
        } else {  
            localWrapper.classList.remove('is-muted');  
        }  

        socket.emit('toggle-mic', { roomId, isMuted: isLocalMuted });  
    }  

    function leaveCall() {  
        window.location.href = '/chat';  
    }  

    function openSettings() {  
        document.getElementById('settings-modal').classList.add('active');  
        scanHardware();  
    }  
    
    function closeSettings() {  
        document.getElementById('settings-modal').classList.remove('active');  
    }  

    async function applySettings() {  
        const micId = document.getElementById('mic-select').value;  
        const quality = document.getElementById('quality-select').value;  
        
        const isNoiseSup = document.getElementById('noise-select').value === "true";  
        const isEchoCan = document.getElementById('echo-select').value === "true";  
        const isAutoGain = document.getElementById('gain-select').value === "true";  

        closeSettings();  

        let audioConstraints = {  
            deviceId: micId ? { exact: micId } : undefined,  
            echoCancellation: isEchoCan,  
            noiseSuppression: isNoiseSup,  
            autoGainControl: isAutoGain  
        };  

        if (quality === 'high') {  
            audioConstraints.sampleRate = 48000;  audioConstraints.sampleSize = 16; audioConstraints.channelCount = 2;  
        } else if (quality === 'low') {  
            audioConstraints.sampleRate = 16000;  
        }  
        
        if (quality === 'ultra') {  

            audioConstraints.sampleRate = 192000;  
            
            audioConstraints.sampleSize = 24;  
            
            audioConstraints.channelCount = 2;  

            audioConstraints.echoCancellation = false;  
            audioConstraints.noiseSuppression = false;  
            audioConstraints.autoGainControl = false;  
        }  

        try {  
            const newStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: audioConstraints });  
            document.getElementById('local-audio').srcObject = newStream;  
            
            for (let userId in peers) {  
                const pc = peers[userId];  
                
                const newAudioTrack = newStream.getAudioTracks()[0];  
                const senderAudio = pc.getSenders().find(s => s.track && s.track.kind === 'audio');  
                if (senderAudio && newAudioTrack) senderAudio.replaceTrack(newAudioTrack);  
            }  

            localStream = newStream;  
            if (isLocalMuted) localStream.getAudioTracks()[0].enabled = false;  

        } catch (err) {  
            console.error("Error applying new hardware/quality settings:", err);  
            alert("Could not switch devices or apply constraints.");  
        }  
    }  

    async function scanHardware() {  
        try {  
            await navigator.mediaDevices.getUserMedia({ audio: true, video: false });  
            const devices = await navigator.mediaDevices.enumerateDevices();  
            const micSelect = document.getElementById('mic-select');  
            
            micSelect.innerHTML = '';  

            devices.forEach(device => {  
                const option = document.createElement('option');  
                option.value = device.deviceId;  
                option.text = device.label || `DEV_${device.deviceId.substring(0,5).toUpperCase()}`;  
                if (device.kind === 'audioinput') micSelect.appendChild(option);  
            });  
        } catch (err) {  
            console.error("Hardware scan failed:", err);  
        }  
    }  

    init();  
</script> 

    </body>
</html>
