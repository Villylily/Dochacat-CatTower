    <style>
        :root {
            --bg-base: #050505;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #ffb7c5; 
            --cardinal: #ff4757; 
            --success: #2ea043;

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(168, 85, 247, 0.15);
            top: -100px; left: -100px;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: rgba(255, 71, 87, 0.1);
            bottom: -50px; right: -50px;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 250px; height: 250px;
            background: rgba(255, 183, 197, 0.1);
            bottom: 20%; left: 20%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);

            z-index: 1;

            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .engine-overline {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;

            letter-spacing: 8px;

            opacity: 0.6;

            padding-left: 8px;

            justify-content: center;

        .cattower-logo {
            font-family: 'Montserrat', sans-serif;

            font-weight: 900;
            letter-spacing: -1.5px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .cattower-logo .alt-color {
            color: var(--accent);
            text-shadow: 0 0 20px rgba(255, 183, 197, 0.4);
        }

        .led-blink-fast { animation: ledBlink 0.6s infinite alternate; }
        .led-blink-slow { animation: ledBlink 2s infinite alternate; }
        .led-blink-alt { animation: ledBlink 1.2s infinite alternate-reverse; }
        
        @keyframes ledBlink {
            0%, 40% { opacity: 1; filter: drop-shadow(0 0 4px currentColor); }
            60%, 100% { opacity: 0.2; filter: none; }
        }

        .auth-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px var(--glass-border); 
            width: 100%; 
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            height: 30px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 8px;
        }

        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
        }
        .dot-red { background: #ff5f56; opacity: 0.3;}
        .dot-yel { background: #ffbd2e; opacity: 0.3;}
        .dot-grn { background: #27c93f; box-shadow: 0 0 10px #27c93f; }

        .form-container {
            padding: 35px 30px;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.4s ease forwards;
        }

        .form-container.active {
            display: flex;

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        .form-container h3 { 
            margin-top: 0; 
            margin-bottom: 25px;
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 18px;
            text-align: center;
            letter-spacing: 1px;
        }

        .auth-input { 
            width: 100%; 
            padding: 14px 16px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
            background: var(--input-bg); 
            color: var(--text-main); 
            box-sizing: border-box; 
            outline: none;
            font-size: 14px;
            font-family: 'Roboto Mono', monospace;
            transition: all 0.3s ease;
        }
        
        .auth-input::placeholder { color: rgba(255, 255, 255, 0.3); }
        .auth-input:focus { 
            border-color: var(--brand-purple); 
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        .auth-btn { 
            width: 100%; 
            padding: 14px; 
            margin-top: 10px; 
            border: none; 
            border-radius: 10px; 
            background: linear-gradient(135deg, var(--brand-purple), var(--brand-purple-hover)); 
            color: #ffffff; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }
        
        .auth-btn:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5); 
        }

        .auth-btn:active:not(:disabled) { transform: translateY(0); }
        
        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .auth-links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 13px;
        }

        .auth-link { 
            color: var(--text-muted); 
            cursor: pointer; 
            transition: color 0.2s;
            font-weight: 600;
        }
        .auth-link:hover { color: var(--text-main); }

        #feedback-msg {
            margin-top: 20px;
            font-size: 13px;
            min-height: 20px;
            font-weight: bold;
            font-family: 'Roboto Mono', monospace;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>

        <div id="login-form" class="form-container active">
            <h3>Dochacat:3 Login</h3>
            <input type="text" id="login-user" class="auth-input" placeholder="Username">

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.form-container').forEach(el => el.classList.remove('active'));
        showFeedback("", ""); 
        document.getElementById(tabId).classList.add('active');
        
        document.querySelectorAll('.auth-input').forEach(input => input.value = '');
        const signupBtn = document.getElementById('signup-btn');
        if (signupBtn) signupBtn.disabled = false;
    }

    function showFeedback(message, color) {
        const feedback = document.getElementById('feedback-msg');
        if (!message) {
            feedback.style.opacity = "0";
            return;
        }
        feedback.style.color = color;
        feedback.innerText = `> ${message}`;
        feedback.style.opacity = "1";
    }

    let typingTimer;                
    const typingInterval = 500;

    document.getElementById('signup-user').addEventListener('input', function() {
        clearTimeout(typingTimer);
        const user = this.value.trim().toLowerCase(); 
        const signupBtn = document.getElementById('signup-btn');

        if (user) {
            showFeedback("Checking availability...", "var(--text-muted)");
            typingTimer = setTimeout(() => checkUsernameAvailability(user), typingInterval);
        } else {
            showFeedback("", "");
            signupBtn.disabled = false;
        }
    });

    async function checkUsernameAvailability(username) {
        const signupBtn = document.getElementById('signup-btn');
        try {
            const response = await fetch('/api/check-user', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const data = await response.json();

            if (data.exists) {
                showFeedback("Username is already taken.", "var(--cardinal)");
                signupBtn.disabled = true;
            } else {
                showFeedback("Username is available!", "var(--success)");
                signupBtn.disabled = false;
            }
        } catch (err) {
            showFeedback("", ""); 
            signupBtn.disabled = false; 
        }
    }

    async function authenticateUser(username, password, invite = null) {
        showFeedback(invite ? "Creating account..." : "Authenticating...", "var(--brand-purple)");

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, invite })
            });

            const data = await response.json();

            if (data.success) {
                localStorage.setItem('cardinal_token', data.token);
                
                showFeedback("Access Granted. Redirecting...", "var(--success)"); 
                setTimeout(() => { window.location.href = data.redirect; }, 1000);
            } else {
                showFeedback(data.error || "Authentication failed.", "var(--cardinal)"); 
            }
        } catch (err) {
            showFeedback("Server connection lost.", "var(--cardinal)");
        }
    }

    function handleLogin() {
        const user = document.getElementById('login-user').value.trim().toLowerCase();
        const pass = document.getElementById('login-pass').value;
        if (!user || !pass) return showFeedback("ERR: Credentials required.", "var(--cardinal)");
        
        authenticateUser(user, pass);
    }

    function handleSignup() {
        const user = document.getElementById('signup-user').value.trim().toLowerCase();
        const pass = document.getElementById('signup-pass').value;
        const invite = document.getElementById('signup-invite').value;

        if (!user || !pass) return showFeedback("ERR: Username and Password required.", "var(--cardinal)");
        
        authenticateUser(user, pass, invite);
    }

    function handleReset() {
        showFeedback("ERR: Reset system is currently offline.", "var(--cardinal)");
    }
</script>

                        box-shadow 0.3s ease,
                        background-image 0.3s ease-in-out;
        }

        .caely-pfp:hover {
            transform: scale(1.08) rotate(5deg);
            border-color: #ffb7c5;
            box-shadow: 0 6px 20px rgba(255, 183, 197, 0.3);
        }

        /* See these = "BAD" you forked something up  */
        .caely-pfp.default-pfp::before, .caely-pfp.default-pfp::after {
            content: ''; position: absolute; top: -4px; width: 12px; height: 12px;
            background: #ffb7c5; border-radius: 2px; z-index: -1;
        }
        .caely-pfp.default-pfp::before { left: 8px; transform: rotate(-15deg); }
        .caely-pfp.default-pfp::after { right: 8px; transform: rotate(15deg); }

        .caely-bubble {
            background: rgba(10, 10, 14, 0.85); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            padding: 14px 18px;
            min-width: 150px;
            max-width: 280px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8); 
            position: relative;
            z-index: 1;
            
            opacity: 0;
            transform: translateY(10px) scale(0.98);
            transform-origin: bottom left;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .caely-widget-container.talking .caely-bubble {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .caely-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 13px;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .caely-text {
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            line-height: 1.5;
            color: #f4f4f5;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .caely-highlight {
            color: #ffb7c5;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 183, 197, 0.4);
        }
        .fx-shake { display: inline-block; animation: fx-shake-anim 0.3s infinite; }
        .fx-pulse { display: inline-block; animation: fx-pulse-anim 1.5s infinite ease-in-out; }

        @keyframes fx-shake-anim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-1px) translateY(1px); }
            75% { transform: translateX(1px) translateY(-1px); }
        }
        @keyframes fx-pulse-anim {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }

        .caely-cursor {
            display: inline-block;
            width: 6px;
            height: 12px;
            background-color: #ffb7c5;
            vertical-align: middle;
            margin-left: 4px;
            animation: caely-blink 0.8s infinite;
        }

        @keyframes caely-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>

            const widgetEl = document.getElementById('caelyWidget');
            const pfpEl = document.getElementById('caelyPfp');

            nameEl.textContent = CONFIG.name;
            
            let isBusy = false;
            let currentEmotion = "neutral";
            let sleepTimer = null;
            let currentInteractionId = 0;

            const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            function setEmotion(emotionKey) {
                if (!CONFIG.emotions[emotionKey]) emotionKey = "neutral";
                currentEmotion = emotionKey;
                const imgUrl = CONFIG.emotions[emotionKey];
                
                if (imgUrl) {
                    pfpEl.style.backgroundImage = `url('${imgUrl}')`;
                    pfpEl.classList.remove('default-pfp');
                }
            }

            setEmotion('neutral');

            function resetSleepTimer() {
                clearTimeout(sleepTimer);
                sleepTimer = setTimeout(() => {
                    if (!isBusy) setEmotion('sleepy');
                }, CONFIG.sleepIdleTimeMs);
            }

            // OoOooO its Got Formatting
            function parseTextToSegments(rawText) {
                const regex = /\*(.*?)\*/g;
                let segments = [];
                let lastIndex = 0;
                let match;

                while ((match = regex.exec(rawText)) !== null) {
                    if (match.index > lastIndex) {
                        segments.push({ t: rawText.slice(lastIndex, match.index) });
                    }
                    const inner = match[1]; 
                    const parts = inner.split('|').map(p => p.trim());
                    let segment = { t: parts[0] }; 

                    if (parts.length === 1) {
                        segment.cssClass = 'caely-highlight';
                    } else {
                        for (let i = 1; i < parts.length; i++) {
                            const mod = parts[i];
                            if (mod.includes(':')) {
                                const [key, val] = mod.split(':').map(p => p.trim());
                                if (key === 'speed') segment.speed = parseFloat(val);
                                if (key === 'color') segment.color = val;
                                if (key === 'class') segment.cssClass = val;
                                if (key === 'glow') segment.glow = val;
                            } else {
                                if (mod === 'bold') segment.bold = true;
                                if (mod === 'italic') segment.italic = true;
                                if (mod === 'br') segment.br = true;
                            }
                        }
                    }
                    segments.push(segment);
                    lastIndex = regex.lastIndex;
                }
                if (lastIndex < rawText.length) {
                    segments.push({ t: rawText.slice(lastIndex) });
                }
                return segments;
            }

            // PAIN IN MY ASS
            async function typeMessage(textString) {
                textTarget.innerHTML = ""; 
                cursorEl.style.display = "inline-block";
                const segments = parseTextToSegments(textString);

                for (const seg of segments) {
                    if (!widgetEl.classList.contains('talking')) break; 

                    const span = document.createElement('span');
                    if (seg.color) span.style.color = seg.color;
                    if (seg.bold) span.style.fontWeight = 'bold';
                    if (seg.italic) span.style.fontStyle = 'italic';
                    if (seg.glow) span.style.textShadow = `0 0 10px ${seg.glow}`;
                    if (seg.cssClass) span.className = seg.cssClass; 
                    textTarget.appendChild(span);

                    const segmentSpeedMult = seg.speed || 1.0;
                    const textToType = seg.t || "";

                    for (let i = 0; i < textToType.length; i++) {
                        if (!widgetEl.classList.contains('talking')) break; 
                        
                        span.textContent += textToType[i];
                        let currentSpeed = CONFIG.baseTypingSpeed + (Math.random() * 20);
                        if (Math.random() > 0.92) currentSpeed += 80; 
                        
                        await wait(currentSpeed * segmentSpeedMult * CONFIG.globalTypingMultiplier);
                    }
                    
                    if (seg.br) {
                        textTarget.appendChild(document.createElement('br'));
                    }
                }
            }

            function closeChat() {
                widgetEl.classList.remove('talking');
                cursorEl.style.display = "none";
                setEmotion('neutral');
                isBusy = false;
                resetSleepTimer();
                currentInteractionId++; 
            }

            async function triggerTalk(forcedMsg = null) {
                if (isBusy || widgetEl.classList.contains('talking')) return;
                
                isBusy = true;
                clearTimeout(sleepTimer); 
                currentInteractionId++;
                const myId = currentInteractionId;
                
                const msgObj = forcedMsg || CONFIG.messages[Math.floor(Math.random() * CONFIG.messages.length)];

                setEmotion(msgObj.emotion);
                textTarget.innerHTML = ""; 
                
                widgetEl.classList.add('talking');
                await wait(300);

                if (myId !== currentInteractionId) return; 

                await typeMessage(msgObj.text);
                

                await wait(CONFIG.readTimeMs);
                
                if (myId !== currentInteractionId) return; 

                closeChat();
            }

            pfpEl.addEventListener('click', () => {
                if (widgetEl.classList.contains('talking')) return; 

                if (currentEmotion === 'sleepy' && !isBusy) {
                    triggerTalk({ 
                        emotion: "shocked", // There is no point in this i added it cus it was funny 
                        text: "Wha-?! I wasn't *sleeping! | class:fx-shake | color:#ffb7c5 | bold | speed:0.5*"
                    });
                } else {
                    triggerTalk();
                }
            });

            async function runAutoChatter() {
                const delay = CONFIG.minSecondsBetweenChatter + 
                    Math.random() * (CONFIG.maxSecondsBetweenChatter - CONFIG.minSecondsBetweenChatter);
                await wait(delay * 1000);
                
                if (!isBusy) await triggerTalk();
                runAutoChatter();
            }

            resetSleepTimer();
            runAutoChatter();
        })();
